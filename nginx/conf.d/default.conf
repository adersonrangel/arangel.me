# HTTP → ACME challenge + Redirect a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name arangel.me www.arangel.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://arangel.me$request_uri;
    }
}

# HTTPS - Dominio principal (arangel.me)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name arangel.me;

    ssl_certificate /etc/letsencrypt/live/arangel.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arangel.me/privkey.pem;
    include /etc/nginx/options-ssl-nginx.conf;

    root /usr/share/nginx/html;
    index index.html;

    # Caché de assets estáticos de Next.js
    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Caché de imágenes
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA-style routing para Next.js
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}

# HTTPS - Redirección www → apex
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.arangel.me;

    ssl_certificate /etc/letsencrypt/live/arangel.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arangel.me/privkey.pem;
    include /etc/nginx/options-ssl-nginx.conf;

    location / {
        return 301 https://arangel.me$request_uri;
    }
}
